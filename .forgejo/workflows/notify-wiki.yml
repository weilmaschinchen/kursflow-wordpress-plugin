name: Notify Wiki on push

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger kursflow-docs build
        run: |
          if [ -z "${{ secrets.WIKI_DISPATCH_TOKEN }}" ]; then
            echo "::warning::WIKI_DISPATCH_TOKEN nicht gesetzt — skip"
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: token ${{ secrets.WIKI_DISPATCH_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://forgejo.kurvenschule.cloud/api/v1/repos/andre/kursflow-docs/actions/workflows/build-and-deploy.yml/dispatches" \
            -d "{\"ref\":\"main\"}"

